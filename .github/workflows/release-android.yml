name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Override versionName (defaults to tag without v prefix)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      APP_ID: com.iaales.quiniela
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          else
            VERSION_NAME="$(node -p "require('./package.json').version")"
          fi
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build signed AAB + APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleRelease :app:assembleRelease \
            -PRELEASE_STORE_FILE=upload.keystore \
            -PRELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD" \
            -PVERSION_CODE=${{ steps.version.outputs.version_code }} \
            -PVERSION_NAME=${{ steps.version.outputs.version_name }}

      - name: Stage release artifacts
        id: stage
        run: |
          STAGE="$RUNNER_TEMP/release"
          mkdir -p "$STAGE"
          VNAME="${{ steps.version.outputs.version_name }}"
          cp android/app/build/outputs/bundle/release/app-release.aab "$STAGE/${APP_ID}-${VNAME}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "$STAGE/${APP_ID}-${VNAME}.apk"
          echo "dir=$STAGE" >> "$GITHUB_OUTPUT"
          ls -la "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_ID }}-${{ steps.version.outputs.version_name }}
          path: ${{ steps.stage.outputs.dir }}/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.dir }}/*
          generate_release_notes: false
          fail_on_unmatched_files: true

      - name: Upload to Play Store
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.APP_ID }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
